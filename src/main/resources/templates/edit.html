<!DOCTYPE HTML>
<html>
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="container">
	<h1 class="display-4 mb-4" th:text="${title}"></h1>
	<p th:text="${msg}"></p>

	<form method="post" action="/edit" th:object="${formModel}">
		<style>.err { color:red }</style>
		<input type="hidden" name="id" th:value="*{id}" />
		<div class="mb-3">
			<label for="assets_number" class="form-label">資産番号</label>
			<input type="text" class="form-control" name="assets_number" th:value="*{assets_number}" />
			<div th:if="${#fields.hasErrors('assets_number')}" th:errors="*{assets_number}" th:errorclass="err"></div>
		</div>
		<div class="mb-3">
			<label for="supplies_name" class="form-label">備品名</label>
			<input type="text" class="form-control" name="supplies_name" th:value="*{supplies_name}" th:errorclass="err" />
			<div th:if="${#fields.hasErrors('supplies_name')}" th:errors="*{supplies_name}" th:errorclass="err"></div>
		</div>
		<div class="mb-3">
			<label for="category" class="form-label">カテゴリ</label>
			<select class="form-select" th:field="*{category}">
				<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.category_name}"></option>
			</select>
		</div>
		<div class="mb-3">
			<label for="holder" class="form-label">所持者</label>
			<input type="text" class="form-control" name="holder" th:value="*{holder}" />
		</div>
		<input type="submit" class="btn btn-primary" value="更新" />
		<a th:href="@{/}" class="btn btn-secondary">取消</a>
	</form>
</body>

</html>
