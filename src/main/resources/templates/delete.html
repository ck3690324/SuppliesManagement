<!DOCTYPE HTML>
<html>
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="container">
	<h1 class="display-4 mb-4" th:text="${title}"></h1>
	<p th:text="${msg}"></p>

	<form method="post" action="/delete" th:object="${formModel}">
		<input type="hidden" name="id" th:value="*{id}" />
		<div class="mb-3">
			<div class="form-label" th:text="備品名"></div>
			<div class="form-control" th:text="*{supplies_name}"></div>
		</div>
		<div class="mb-3">
			<div class="form-label" th:text="カテゴリ"></div>
			<div class="form-control" th:text="*{category.category_name}"></div>
		</div>
		<div class="mb-3">
			<div class="form-label" th:text="所持者"></div>
			<div class="form-control" th:text="*{holder != null && holder != '' ? holder : 'なし'}"></div>
		</div>
		<div class="mb-3">
			<div class="form-label" th:text="資産番号"></div>
			<div class="form-control" th:text="*{assets_number}"></div>
		</div>
		<input type="submit" class="btn btn-danger" value="削除" />
		<a th:href="@{/}" class="btn btn-secondary">取消</a>
	</form>
</body>

</html>
