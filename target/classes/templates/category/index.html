<!DOCTYPE html>
<html>
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="container">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h1 class="display-4 mb-0" th:text="${title}"></h1>

		<a th:href="@{/}" class="btn btn-info">備品管理</a>
	</div>
	
	<hr>
	
	<form method="post" action="/category" th:object="${categoryFormModel}">
		<style> .err { color: red }</style>
		<div class="mb-3">
			<label for="category_name" class="form-label">カテゴリ名</label>
			<input type="text" class="form-control" name="category_name" th:value="*{category_name}" th:errorclass="err" />
			<div th:if="${#fields.hasErrors('category_name')}" th:errors="*{category_name}" th:errorclass="err"></div>
		</div>
		<input type="submit" class="btn btn-primary" value="カテゴリ追加" />
	</form>
	
	<hr>
	<table class="table">
		<thead>
			<tr>
				<!-- <th>ID</th> -->
				<th>カテゴリ</th>
				<th>備品数</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="item : ${data}">
				<!-- <td th:text="${item.id}"></td> -->
				<td th:text="${item.category_name}"></td>
				<!-- lists.sizesで各カテゴリの長さ(備品数を取得) -->
				<td th:text="${#lists.size(item.supplies)}"></td>
				<td>
					<a th:href="@{/category/edit/{id}(id=${item.id})}" class="btn btn-sm btn-primary">編集</a>
					<a th:href="@{/category/delete/{id}(id=${item.id})}" class="btn btn-sm btn-danger">削除</a>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
