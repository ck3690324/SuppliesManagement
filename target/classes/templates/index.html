<!DOCTYPE html>
<html>
<head>
<title th:text="${title}"></title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<script src="/js/sort.js" charset="UTF-8" defer></script>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body class="container">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h1 class="display-4 mb-0" th:text="${title}"></h1>
		<a th:href="@{/category}" class="btn btn-info">カテゴリ管理</a>
	</div>

	<hr>

	<form method="post" action="/" th:object="${formModel}">
		<style> .err { color: red }</style>
		<div class="mb-3">
			<label for="assets_number" class="form-label">資産番号</label>
			<input type="text" class="form-control" name="assets_number" th:value="*{assets_number}" th:errorclass="err" />
			<div th:if="${#fields.hasErrors('assets_number')}" th:errors="*{assets_number}" th:errorclass="err"></div>
		</div>
		<div class="mb-3">
			<label for="supplies_name" class="form-label">備品名</label>
			<input type="text" class="form-control" name="supplies_name" th:value="*{supplies_name}" th:errorclass="err" />
			<div th:if="${#fields.hasErrors('supplies_name')}" th:errors="*{supplies_name}" th:errorclass="err"></div>
		</div>
		<div class="mb-3">
			<label for="category" class="form-label">カテゴリ</label>
			<select class="form-select" th:field="*{category}">
				<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.category_name}"></option>
			</select>
		</div>
		<div class="mb-3">
			<label for="holder" class="form-label">所持者</label>
			<input type="text"
				class="form-control" name="holder" th:value="*{holder}"
				th:errorclass="err" />
		</div>
		<input type="submit" class="btn btn-primary" value="新規登録" />
	</form>

	<hr>

	<table class="table" id="suppliesTable">
		<thead>
			<tr>
				<!-- <th>ID</th> -->
				<th onclick="sortTable(0)">資産番号</th>
				<th onclick="sortTable(1)">備品名</th>
				<th onclick="sortTable(2)">カテゴリ</th>
				<th onclick="sortTable(3)">所持者</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="item : ${data}">
				<!-- <td th:text="${item.id}"></td> -->
				<td th:text="${item.assets_number}"></td>
				<td th:text="${item.supplies_name}"></td>
				<td th:text="${item.category.category_name}"></td>
				<td th:text="${item.holder}"></td>
				<td>
					<a th:href="@{/edit/{id}(id=${item.id})}" class="btn btn-sm btn-primary">編集</a>
					<a th:href="@{/delete/{id}(id=${item.id})}" class="btn btn-sm btn-danger">削除</a>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
